<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="唐揚げ販売管理">
<meta name="mobile-web-app-capable" content="yes">
<title>🍗 唐揚げ販売管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Dela+Gothic+One&display=swap');
:root{
  --primary:#E8650A;--primary-dark:#C4520A;--primary-light:#FFF0E6;
  --gold:#F5A623;--gold-dark:#D4881A;--brown:#6B3A2A;
  --cream:#FFF8F0;--surface:#FFF;--surface2:#FFF5ED;
  --text:#2D1A0E;--text2:#6B4C3B;--text3:#A07060;
  --border:#F0D4C0;--success:#2EAA5E;--danger:#E53E3E;--info:#2B7CBF;
  --shadow:0 2px 12px rgba(232,101,10,.12);--shadow-lg:0 8px 32px rgba(232,101,10,.18);
  --radius:14px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--text);font-size:14px;}
.app{display:flex;flex-direction:column;height:100%;max-width:900px;margin:0 auto;}

/* HEADER */
.header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:10px 16px;padding-top:max(10px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-lg);flex-shrink:0;}
.header-title{font-family:'Dela Gothic One',sans-serif;font-size:18px;}
.header-sub{font-size:11px;opacity:.85;margin-top:1px;}
.event-badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;}
.event-badge:active{background:rgba(255,255,255,.4);}

/* NAV */
.nav{background:var(--surface);border-bottom:2px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{flex:none;padding:10px 16px;border:none;background:none;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;}
.nav-btn.active{color:var(--primary);border-bottom-color:var(--primary);}
.nav-btn:active:not(.active){background:var(--surface2);}

/* PAGES */
.page-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page{display:none;padding:12px;padding-bottom:max(12px,env(safe-area-inset-bottom));}
.page.active{display:block;}

/* REGISTER */
.register-layout{display:grid;grid-template-columns:1fr 320px;gap:12px;}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.menu-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:12px 10px;text-align:center;cursor:pointer;transition:all .15s;position:relative;user-select:none;}
.menu-card:active{transform:scale(.95);background:var(--primary-light);border-color:var(--primary);}
.menu-card.in-cart{border-color:var(--gold);background:#FFFBF2;}
.menu-card-emoji{font-size:32px;margin-bottom:6px;display:block;}
.menu-card-name{font-size:12px;font-weight:700;line-height:1.3;}
.menu-card-price{font-size:15px;font-weight:900;color:var(--primary);margin-top:3px;}
.menu-card-badge{position:absolute;top:-6px;right:-6px;background:var(--gold);color:var(--brown);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;}

/* CART */
.cart-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;max-height:calc(100vh - 130px);position:sticky;top:0;box-shadow:var(--shadow);}
.cart-header{padding:12px 14px;border-bottom:1.5px solid var(--border);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.cart-items{flex:1;overflow-y:auto;padding:8px;-webkit-overflow-scrolling:touch;}
.cart-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--radius-sm);margin-bottom:4px;background:var(--surface2);}
.cart-item-name{flex:1;font-size:12px;font-weight:700;}
.qty-btn{width:28px;height:28px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.qty-btn:active{background:var(--primary);color:#fff;border-color:var(--primary);}
.cart-item-qty{font-size:13px;font-weight:900;width:22px;text-align:center;}
.cart-item-subtotal{font-size:12px;font-weight:700;color:var(--primary);min-width:50px;text-align:right;}
.cart-remove{color:var(--text3);cursor:pointer;font-size:16px;padding:4px;border:none;background:none;}

.cart-footer{padding:10px 14px;border-top:1.5px solid var(--border);flex-shrink:0;}
.cart-total-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.cart-total-label{font-size:12px;color:var(--text2);}
.cart-total-amount{font-size:22px;font-weight:900;color:var(--brown);font-family:'Dela Gothic One',sans-serif;}

/* 決済ボタン */
.pay-method-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:8px;}
.pay-btn{padding:8px 4px;border:2px solid transparent;border-radius:var(--radius-sm);font-family:'Noto Sans JP',sans-serif;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.2;position:relative;}
.pay-btn .pay-icon{font-size:15px;}
.pay-btn .pay-check{display:none;position:absolute;top:3px;right:4px;width:12px;height:12px;background:#fff;border-radius:50%;font-size:9px;line-height:12px;text-align:center;font-weight:900;}
.pay-btn.selected .pay-check{display:block;}
.pay-btn.cash-btn{background:#E8F5E9;border-color:#A5D6A7;color:#2E7D32;}
.pay-btn.paypay-btn{background:#FFF3E0;border-color:#FFCC80;color:#E65100;}
.pay-btn.aupay-btn{background:#FFF8E1;border-color:#FFE082;color:#F57F17;}
.pay-btn.dpay-btn{background:#FCE4EC;border-color:#F48FB1;color:#AD1457;}
.pay-btn.rakuten-btn{background:#FFEBEE;border-color:#EF9A9A;color:#B71C1C;}
.pay-btn.other-btn{background:#F5F5F5;border-color:#BDBDBD;color:#616161;}
.pay-btn.cash-btn.selected{background:#2E7D32;border-color:#1B5E20;color:#fff;box-shadow:0 3px 10px rgba(46,125,50,.45);}
.pay-btn.paypay-btn.selected{background:#D84315;border-color:#BF360C;color:#fff;box-shadow:0 3px 10px rgba(216,67,21,.45);}
.pay-btn.aupay-btn.selected{background:#E65100;border-color:#BF360C;color:#fff;box-shadow:0 3px 10px rgba(230,81,0,.45);}
.pay-btn.dpay-btn.selected{background:#C2185B;border-color:#880E4F;color:#fff;box-shadow:0 3px 10px rgba(194,24,91,.45);}
.pay-btn.rakuten-btn.selected{background:#B71C1C;border-color:#7F0000;color:#fff;box-shadow:0 3px 10px rgba(183,28,28,.45);}
.pay-btn.other-btn.selected{background:#424242;border-color:#212121;color:#fff;box-shadow:0 3px 10px rgba(66,66,66,.45);}
.pay-btn:active{transform:scale(.93);}

/* おつり */
.change-area{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;}
.change-area.hidden{display:none;}
.change-area-title{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:7px;}
.cash-presets{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.cash-preset-btn{padding:5px 8px;border:1.5px solid #A5D6A7;border-radius:6px;background:#E8F5E9;color:#2E7D32;font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:700;cursor:pointer;}
.cash-preset-btn:active{background:#43A047;color:#fff;}
.cash-preset-btn.active{background:#2E7D32;color:#fff;border-color:#1B5E20;box-shadow:0 2px 6px rgba(46,125,50,.35);}
.received-display{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#fff;border:2px solid #A5D6A7;border-radius:8px;margin-bottom:6px;cursor:pointer;}
.received-display:active{border-color:#2E7D32;background:#E8F5E9;}
.received-label{font-size:11px;font-weight:700;color:var(--text2);}
.received-value{font-family:'Dela Gothic One',sans-serif;font-size:20px;color:#2E7D32;}
.received-value.empty{color:var(--text3);font-size:14px;font-family:'Noto Sans JP',sans-serif;}
.tenkey-wrap{margin-bottom:6px;}
.tenkey-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.tkey{padding:12px 4px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);font-family:'Dela Gothic One',sans-serif;font-size:18px;cursor:pointer;color:var(--text);text-align:center;}
.tkey:active{background:var(--primary-light);border-color:var(--primary);transform:scale(.93);}
.tkey.zero{grid-column:span 2;}
.tkey.del{background:#FFF5F5;color:var(--danger);border-color:#F9C0C0;font-size:16px;}
.tkey.del:active{background:var(--danger);color:#fff;}
.tkey.clear-key{background:#FFF5ED;color:var(--primary-dark);border-color:var(--border);font-size:12px;font-family:'Noto Sans JP',sans-serif;font-weight:700;}
.change-result{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:6px;background:#fff;border:1.5px solid var(--border);}
.change-result-label{font-size:11px;font-weight:700;color:var(--text2);}
.change-result-amount{font-size:22px;font-weight:900;font-family:'Dela Gothic One',sans-serif;color:var(--info);}
.change-result-amount.short{color:var(--danger);}

.checkout-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Dela Gothic One',sans-serif;font-size:17px;cursor:pointer;letter-spacing:.08em;box-shadow:0 4px 14px rgba(232,101,10,.35);margin-top:6px;}
.checkout-btn:active{transform:scale(.97);}
.checkout-btn:disabled{opacity:.4;}
.clear-btn{width:100%;padding:9px;background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;color:var(--text3);cursor:pointer;margin-top:5px;}
.clear-btn:active{border-color:var(--danger);color:var(--danger);background:#FFF5F5;}

.cat-filter{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.cat-chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:11px;font-weight:700;cursor:pointer;color:var(--text2);}
.cat-chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.cat-chip:active{transform:scale(.95);}

/* INVENTORY */
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.inv-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);}
.inv-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.inv-label{font-size:11px;color:var(--text3);}
.inv-input{width:70px;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;text-align:right;background:var(--surface2);color:var(--text);outline:none;}
.inv-input:focus{border-color:var(--primary);background:var(--primary-light);}
.inv-remaining{text-align:center;padding:8px;background:var(--surface2);border-radius:var(--radius-sm);margin-top:8px;}
.inv-remaining-num{font-size:22px;font-weight:900;font-family:'Dela Gothic One',sans-serif;color:var(--primary);}
.inv-remaining-label{font-size:10px;color:var(--text3);}
.inv-remaining.low .inv-remaining-num{color:var(--danger);}
.inv-remaining.ok .inv-remaining-num{color:var(--success);}

/* EXPENSE */
.expense-form{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:11px;font-weight:700;color:var(--text2);}
.form-input,.form-select{padding:10px;border:1.5px solid var(--border);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:14px;background:var(--surface2);color:var(--text);outline:none;}
.form-input:focus,.form-select:focus{border-color:var(--primary);background:var(--primary-light);}
.add-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--brown);border:none;border-radius:8px;font-family:'Dela Gothic One',sans-serif;font-size:15px;cursor:pointer;box-shadow:0 3px 10px rgba(245,166,35,.35);}
.add-btn:active{transform:scale(.97);}
.material-section{background:var(--primary-light);border:1.5px solid #F5C8A0;border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;}
.material-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.material-title{font-size:12px;font-weight:700;color:var(--brown);}
.material-add-btn{padding:5px 12px;border:1.5px solid var(--primary);border-radius:6px;background:#fff;color:var(--primary);font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:700;cursor:pointer;}
.material-add-btn:active{background:var(--primary);color:#fff;}
.material-row{display:grid;grid-template-columns:1fr 60px 78px 78px 30px;gap:5px;align-items:center;margin-bottom:5px;}
.material-row-header{display:grid;grid-template-columns:1fr 60px 78px 78px 30px;gap:5px;margin-bottom:4px;}
.material-col-label{font-size:10px;font-weight:700;color:var(--text3);text-align:center;}
.material-col-label:first-child{text-align:left;}
.material-input{padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:12px;background:#fff;color:var(--text);outline:none;width:100%;text-align:right;}
.material-input:first-child{text-align:left;}
.material-input:focus{border-color:var(--primary);}
.material-subtotal{font-size:12px;font-weight:700;color:var(--brown);text-align:right;padding:5px 6px;background:rgba(255,255,255,.7);border-radius:6px;}
.material-del-btn{width:28px;height:28px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0;}
.material-del-btn:active{background:#FFEBEE;color:var(--danger);}
.material-total-row{display:flex;justify-content:space-between;align-items:center;padding:8px 6px;border-top:1.5px dashed #F5C8A0;margin-top:4px;}
.other-expense-form{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;}
.expense-list{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.expense-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);}
.expense-item:last-child{border-bottom:none;}
.expense-cat-badge{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;background:var(--primary-light);color:var(--primary-dark);white-space:nowrap;}
.expense-memo{flex:1;font-size:11px;color:var(--text2);}
.expense-amount{font-size:14px;font-weight:900;color:var(--brown);white-space:nowrap;}
.expense-del{border:none;background:none;color:var(--text3);cursor:pointer;font-size:18px;padding:4px;}

/* REPORT */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:14px;}
.kpi-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;box-shadow:var(--shadow);}
.kpi-label{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:4px;letter-spacing:.05em;}
.kpi-value{font-size:22px;font-weight:900;font-family:'Dela Gothic One',sans-serif;}
.kpi-value.green{color:var(--success);}.kpi-value.orange{color:var(--primary);}.kpi-value.gold{color:var(--gold-dark);}.kpi-value.red{color:var(--danger);}.kpi-value.blue{color:var(--info);}
.report-table-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:auto;box-shadow:var(--shadow);margin-bottom:12px;}
.report-table{width:100%;border-collapse:collapse;font-size:12px;}
.report-table th{background:var(--primary);color:#fff;padding:8px 12px;text-align:left;font-size:11px;font-weight:700;}
.report-table td{padding:8px 12px;border-bottom:1px solid var(--border);}
.report-table tr:last-child td{border-bottom:none;}
.report-table .num{text-align:right;font-weight:700;font-family:'Dela Gothic One',sans-serif;}
.export-row{display:flex;gap:10px;flex-wrap:wrap;}
.export-btn{flex:1;min-width:140px;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:6px;}
.export-btn:active{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}

/* SETTINGS */
.settings-section{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:14px;}
.settings-section-header{padding:10px 14px;background:var(--primary);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.menu-sort-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);}
.menu-sort-item:last-child{border-bottom:none;}
.menu-sort-item.dragging{opacity:.4;background:var(--primary-light);}
.menu-sort-item.drag-over{border-top:2px solid var(--primary);}
.drag-handle{cursor:grab;color:var(--text3);font-size:18px;padding:4px;user-select:none;}
.icon-btn{padding:6px 12px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface2);font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:700;cursor:pointer;color:var(--text2);}
.icon-btn:active{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:20px;padding-bottom:max(20px,env(safe-area-inset-bottom));width:100%;max-width:900px;max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:var(--shadow-lg);animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-title{font-size:16px;font-weight:900;margin-bottom:14px;}
.modal-footer{display:flex;gap:8px;margin-top:14px;}
.modal-btn{flex:1;padding:12px;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;}
.modal-btn.primary{background:var(--primary);color:#fff;}
.modal-btn.primary:active{background:var(--primary-dark);}
.modal-btn.cancel{background:var(--surface2);color:var(--text2);border:1.5px solid var(--border);}

/* TOAST */
.toast{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(80px);background:var(--brown);color:#fff;padding:12px 24px;border-radius:30px;font-size:14px;font-weight:700;z-index:2000;transition:transform .3s ease;white-space:nowrap;box-shadow:var(--shadow-lg);}
.toast.show{transform:translateX(-50%) translateY(0);}

.section-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.hour-chart{display:flex;align-items:flex-end;gap:3px;height:60px;margin:8px 0 4px;}
.hour-bar{flex:1;background:var(--primary-light);border-radius:3px 3px 0 0;min-height:3px;}
.hour-bar:active{background:var(--primary);}
.hour-labels{display:flex;gap:3px;}
.hour-label{flex:1;font-size:9px;text-align:center;color:var(--text3);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.empty-state{text-align:center;padding:32px 16px;color:var(--text3);font-size:13px;}
.empty-emoji{font-size:40px;margin-bottom:8px;}

@media(max-width:640px){
  .register-layout{grid-template-columns:1fr;}
  .cart-panel{position:static;max-height:none;}
  .form-row{grid-template-columns:1fr;}
  .material-row,.material-row-header{grid-template-columns:1fr 55px 72px 72px 28px;}
}
</style>
</head>
<body>
<div class="app">
<div class="header">

<!-- REGISTER -->
<div class="page active" id="page-register">
  <div class="cat-filter" id="cat-filter"></div>
  <div class="register-layout">
    <div><div class="menu-grid" id="menu-grid"></div></div>
    <div>
      <div class="cart-panel">
        <div class="cart-header">
          <span>🛒 注文内容</span>
          <span id="cart-count" style="font-size:11px;color:var(--text3);">0品</span>
        </div>
        <div class="cart-items" id="cart-items">
          <div class="empty-state"><div class="empty-emoji">🍗</div>メニューをタップして追加</div>
        </div>
        <div class="cart-footer">
          <div class="cart-total-row">
            <span class="cart-total-label">合計</span>
            <span class="cart-total-amount" id="cart-total">¥0</span>
          </div>
          <div style="font-size:10px;font-weight:700;color:var(--text3);margin-bottom:5px;letter-spacing:.05em;">決済方法</div>
          <div class="pay-method-grid">
            <button class="pay-btn cash-btn selected" onclick="selectPay(this,'cash')"><span class="pay-icon">💴</span>現金<span class="pay-check">✓</span></button>
            <button class="pay-btn paypay-btn" onclick="selectPay(this,'paypay')"><span class="pay-icon">🔴</span>PayPay<span class="pay-check">✓</span></button>
            <button class="pay-btn aupay-btn" onclick="selectPay(this,'aupay')"><span class="pay-icon">🟡</span>auPay<span class="pay-check">✓</span></button>
            <button class="pay-btn dpay-btn" onclick="selectPay(this,'dpay')"><span class="pay-icon">💗</span>d払い<span class="pay-check">✓</span></button>
            <button class="pay-btn rakuten-btn" onclick="selectPay(this,'rakuten')"><span class="pay-icon">🅡</span>楽天Pay<span class="pay-check">✓</span></button>
            <button class="pay-btn other-btn" onclick="selectPay(this,'other')"><span class="pay-icon">💳</span>その他<span class="pay-check">✓</span></button>
          </div>
          <div class="change-area" id="change-area">
            <div class="change-area-title">💴 預かり金額・おつり計算</div>
            <div class="cash-presets" id="cash-presets"></div>
            <div class="received-display" id="received-display" onclick="toggleTenkey()">
              <span class="received-label">預かり金額</span>
              <span class="received-value empty" id="received-value-disp">タップして入力</span>
            </div>
            <div class="tenkey-wrap" id="tenkey-wrap" style="display:none;">
              <div class="tenkey-grid">
                <button class="tkey" onclick="tkeyPress('7')">7</button>
                <button class="tkey" onclick="tkeyPress('8')">8</button>
                <button class="tkey" onclick="tkeyPress('9')">9</button>
                <button class="tkey" onclick="tkeyPress('4')">4</button>
                <button class="tkey" onclick="tkeyPress('5')">5</button>
                <button class="tkey" onclick="tkeyPress('6')">6</button>
                <button class="tkey" onclick="tkeyPress('1')">1</button>
                <button class="tkey" onclick="tkeyPress('2')">2</button>
                <button class="tkey" onclick="tkeyPress('3')">3</button>
                <button class="tkey zero" onclick="tkeyPress('0')">0</button>
                <button class="tkey del" onclick="tkeyPress('del')">⌫</button>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:5px;">
                <button class="tkey clear-key" onclick="tkeyPress('clear')">クリア</button>
                <button class="tkey clear-key" onclick="tkeyPress('00')" style="background:var(--surface2);">00</button>
              </div>
            </div>
            <div class="change-result">
              <span class="change-result-label">おつり</span>
              <span class="change-result-amount" id="change-amount">—</span>
            </div>
          </div>
          <button class="checkout-btn" id="checkout-btn" onclick="checkout()" disabled>決　済</button>
          <button class="clear-btn" onclick="clearCart()">クリア</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- INVENTORY -->
<div class="page" id="page-inventory">

<!-- EXPENSE -->

  <div class="expense-form">
    <div class="section-title" style="margin-bottom:12px;">💰 経費入力</div>
    <div class="material-section">
      <div class="material-header">

      </div>
      <div class="material-row-header">

      <div class="material-total-row">
        <span style="font-size:12px;font-weight:700;color:var(--text2);">材料費 合計</span>

      </div>
      <button class="add-btn" style="margin-top:8px;" onclick="saveMaterialExpense()">＋ 材料費を登録</button>
    </div>
    <div class="other-expense-form">
      <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;">📋 その他経費</div>

          <select class="form-select" id="exp-cat"><option>交通費</option><option>出店料</option><option>消耗品</option><option>人件費</option><option>その他</option></select>

      <div class="form-group" style="margin-bottom:10px;"><label class="form-label">メモ</label><input class="form-input" type="text" id="exp-memo" placeholder="例：交通費・出店料など"></div>

    合計経費: <span id="expense-total" style="font-family:'Dela Gothic One',sans-serif;font-size:18px;color:var(--primary);">¥0</span>

      <button class="icon-btn" style="background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4);color:#fff;" onclick="openAddMenuModal()">＋ 追加</button>

<!-- MODALS -->
<div class="modal-overlay" id="event-modal">
  <div class="modal">
    <div class="modal-title">📅 イベント選択</div>
    <div id="event-list-modal"></div>
    <div class="modal-footer"><button class="modal-btn cancel" onclick="closeModal('event-modal')">閉じる</button></div>
  </div>
</div>

<div class="modal-overlay" id="add-menu-modal">
  <div class="modal">
    <div class="modal-title" id="add-menu-title">🍗 メニューを追加</div>
    <div class="form-group" style="margin-bottom:10px;">
      <label class="form-label">絵文字アイコン</label>
      <input class="form-input" id="m-emoji" placeholder="🍗" maxlength="4" style="font-size:24px;text-align:center;">
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">商品名</label><input class="form-input" id="m-name" placeholder="例：唐揚げ(3個)"></div>
      <div class="form-group"><label class="form-label">カテゴリ</label>
        <select class="form-select" id="m-cat"><option>唐揚げ</option><option>セット</option><option>ドリンク</option><option>サイド</option><option>その他</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">販売価格(円)</label><input class="form-input" type="number" id="m-price" placeholder="500"></div>
      <div class="form-group"><label class="form-label">原価(円)</label><input class="form-input" type="number" id="m-cost" placeholder="150"></div>
    </div>
    <div style="margin-bottom:10px;">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:4px 0;">
        <input type="checkbox" id="m-is-set" style="width:18px;height:18px;"> セット販売
      </label>
    </div>
    <input type="hidden" id="m-edit-id">

      <button class="modal-btn cancel" onclick="closeModal('add-menu-modal')">キャンセル</button>
      <button class="modal-btn primary" onclick="saveMenuItem()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DB_KEY='karaage_app_v4';
const PAY_LABELS={cash:'現金',paypay:'PayPay',aupay:'auPay',dpay:'d払い',rakuten:'楽天Pay',other:'その他'};
let state={events:[],currentEventId:null,menuItems:[],orders:[],inventory:{},expenses:[]};
function loadState(){try{const s=localStorage.getItem(DB_KEY);if(s)state={...state,...JSON.parse(s)};}catch(e){}}
function saveState(){try{localStorage.setItem(DB_KEY,JSON.stringify(state));}catch(e){}}
let cart=[],payMethod='cash',receivedStr='',tenkeyOpen=false;

function seedDefaultData(){
  if(!state.menuItems||state.menuItems.length===0){
    state.menuItems=[
      {id:1,emoji:'🍗',name:'唐揚げ 3個',cat:'唐揚げ',price:400,cost:110,isSet:false},
      {id:2,emoji:'🍗',name:'唐揚げ 5個',cat:'唐揚げ',price:600,cost:170,isSet:false},
      {id:3,emoji:'🍱',name:'唐揚げ弁当',cat:'セット',price:800,cost:260,isSet:true},
      {id:4,emoji:'🍺',name:'ビール',cat:'ドリンク',price:500,cost:200,isSet:false},
      {id:5,emoji:'🥤',name:'ソフトドリンク',cat:'ドリンク',price:200,cost:60,isSet:false},
      {id:6,emoji:'🍟',name:'ポテト S',cat:'サイド',price:300,cost:80,isSet:false},
      {id:7,emoji:'🌶️',name:'激辛唐揚げ 3個',cat:'唐揚げ',price:450,cost:120,isSet:false},
    ];
  }
  if(!state.events||state.events.length===0){
    state.events=[{id:1,name:'春まつり2025',date:new Date().toISOString().slice(0,10),place:'サンプル公園'}];
    state.currentEventId=1;
  }
  if(!Array.isArray(state.expenses))state.expenses=[];
  if(!state.inventory)state.inventory={};
  saveState();
}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  document.querySelector('.page-wrap').scrollTop=0;
  if(name==='register')renderRegister();
  if(name==='inventory')renderInventory();
  if(name==='expense'){renderExpenses();initMaterialRows();}
  if(name==='report')renderReport();
  if(name==='settings')renderSettings();
}

let currentCat='全て';
function renderRegister(){renderCatFilter();renderMenuGrid();renderCart();updateChangeArea();}
function renderCatFilter(){
  const cats=['全て',...new Set(state.menuItems.map(m=>m.cat))];
  document.getElementById('cat-filter').innerHTML=cats.map(c=>`<div class="cat-chip${c===currentCat?' active':''}" onclick="filterCat('${c}')">${c}</div>`).join('');
}
function filterCat(cat){currentCat=cat;renderCatFilter();renderMenuGrid();}
function renderMenuGrid(){
  const items=currentCat==='全て'?state.menuItems:state.menuItems.filter(m=>m.cat===currentCat);
  const el=document.getElementById('menu-grid');
  if(!items.length){el.innerHTML='<div class="empty-state"><div class="empty-emoji">😅</div>このカテゴリにメニューはありません</div>';return;}
  el.innerHTML=items.map(item=>{
    const inCart=cart.find(c=>c.id===item.id);
    const inv=getInventory(item.id);
    const outOfStock=inv.stocked>0&&(inv.stocked-inv.sold-inv.wasted)<=0;
    return `<div class="menu-card${inCart?' in-cart':''}${outOfStock?'" style="opacity:.4;pointer-events:none;"':'"'} onclick="addToCart(${item.id})">
      ${inCart?`<div class="menu-card-badge">${inCart.qty}</div>`:''}
      <span class="menu-card-emoji">${item.emoji}</span>
      <div class="menu-card-name">${item.name}${item.isSet?'<span style="font-size:9px;background:var(--gold-dark);color:#fff;border-radius:3px;padding:1px 4px;margin-left:3px;">SET</span>':''}</div>
      <div class="menu-card-price">¥${item.price.toLocaleString()}</div>
      ${outOfStock?'<div style="font-size:10px;color:var(--danger);font-weight:700;margin-top:2px;">SOLD OUT</div>':''}
    </div>`;
  }).join('');
}
function addToCart(id){
  const item=state.menuItems.find(m=>m.id===id);if(!item)return;
  const ex=cart.find(c=>c.id===id);
  if(ex)ex.qty++;else cart.push({id,name:item.name,price:item.price,qty:1,emoji:item.emoji});
  renderMenuGrid();renderCart();calcChange();renderCashPresets();
}
function renderCart(){
  const el=document.getElementById('cart-items');
  const total=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const count=cart.reduce((s,c)=>s+c.qty,0);
  document.getElementById('cart-count').textContent=count+'品';
  document.getElementById('cart-total').textContent='¥'+total.toLocaleString();
  document.getElementById('checkout-btn').disabled=cart.length===0;
  if(!cart.length){el.innerHTML='<div class="empty-state"><div class="empty-emoji">🍗</div>メニューをタップして追加</div>';return;}
  el.innerHTML=cart.map(c=>`
    <div class="cart-item">
      <span style="font-size:16px;">${c.emoji}</span>
      <span class="cart-item-name">${c.name}</span>
      <div style="display:flex;align-items:center;gap:4px;">
        <button class="qty-btn" onclick="changeQty(${c.id},-1)">−</button>
        <span class="cart-item-qty">${c.qty}</span>
        <button class="qty-btn" onclick="changeQty(${c.id},1)">＋</button>
      </div>
      <span class="cart-item-subtotal">¥${(c.price*c.qty).toLocaleString()}</span>
      <button class="cart-remove" onclick="removeFromCart(${c.id})">✕</button>
    </div>`).join('');
}
function changeQty(id,delta){
  const item=cart.find(c=>c.id===id);if(!item)return;
  item.qty+=delta;if(item.qty<=0)cart=cart.filter(c=>c.id!==id);
  renderMenuGrid();renderCart();calcChange();renderCashPresets();
}
function removeFromCart(id){cart=cart.filter(c=>c.id!==id);renderMenuGrid();renderCart();calcChange();renderCashPresets();}
function clearCart(){
  cart=[];receivedStr='';tenkeyOpen=false;
  document.getElementById('tenkey-wrap').style.display='none';
  updateReceivedDisp();renderMenuGrid();renderCart();calcChange();renderCashPresets();
}
function selectPay(btn,method){
  payMethod=method;
  document.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  updateChangeArea();
}
function updateChangeArea(){
  const area=document.getElementById('change-area');
  if(payMethod==='cash'){area.classList.remove('hidden');renderCashPresets();calcChange();}
  else area.classList.add('hidden');
}
function toggleTenkey(){
  tenkeyOpen=!tenkeyOpen;
  document.getElementById('tenkey-wrap').style.display=tenkeyOpen?'block':'none';
}
function tkeyPress(v){
  if(v==='del')receivedStr=receivedStr.slice(0,-1);
  else if(v==='clear')receivedStr='';
  else if(v==='00'){if(receivedStr.length>0)receivedStr+='00';}
  else{if(receivedStr.length<7)receivedStr+=v;}
  receivedStr=receivedStr.replace(/^0+/,'');
  updateReceivedDisp();calcChange();
  const val=parseInt(receivedStr)||0;
  document.querySelectorAll('.cash-preset-btn').forEach(b=>{b.classList.toggle('active',parseInt(b.dataset.amount)===val&&val>0);});
}
function updateReceivedDisp(){
  const el=document.getElementById('received-value-disp');
  if(!receivedStr){el.textContent='タップして入力';el.className='received-value empty';}
  else{el.textContent='¥'+parseInt(receivedStr).toLocaleString();el.className='received-value';}
}
function renderCashPresets(){
  const total=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const presets=generatePresets(total);
  const cur=parseInt(receivedStr)||0;
  document.getElementById('cash-presets').innerHTML=presets.map(p=>
    `<button class="cash-preset-btn${cur===p?' active':''}" data-amount="${p}" onclick="setPreset(${p})">¥${p.toLocaleString()}</button>`
  ).join('');
}
function generatePresets(total){
  if(total<=0)return[500,1000,5000,10000];
  const result=new Set();
  [10,50,100,500,1000,5000,10000].forEach(b=>{const c=Math.ceil(total/b)*b;if(c>=total&&c<=total*4)result.add(c);});
  [1000,5000,10000].forEach(v=>{if(v>=total)result.add(v);});
  return[...result].sort((a,b)=>a-b).slice(0,5);
}
function setPreset(amount){
  receivedStr=String(amount);updateReceivedDisp();calcChange();
  document.querySelectorAll('.cash-preset-btn').forEach(b=>{b.classList.toggle('active',parseInt(b.dataset.amount)===amount);});
}
function calcChange(){
  const total=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const received=parseInt(receivedStr)||0;
  const el=document.getElementById('change-amount');
  if(!received){el.textContent='—';el.className='change-result-amount';return;}
  const change=received-total;
  if(change<0){el.textContent='¥'+Math.abs(change).toLocaleString()+' 不足';el.className='change-result-amount short';}
  else{el.textContent='¥'+change.toLocaleString();el.className='change-result-amount';}
}
function checkout(){
  if(!cart.length)return;
  const total=cart.reduce((s,c)=>s+c.price*c.qty,0);
  if(payMethod==='cash'){const received=parseInt(receivedStr)||0;if(received>0&&received<total){showToast('⚠️ 預かり金額が不足しています');return;}}
  const order={id:Date.now(),eventId:state.currentEventId,time:new Date().toISOString(),payMethod,receivedAmount:payMethod==='cash'?(parseInt(receivedStr)||0):null,items:cart.map(c=>({...c})),total};
  if(!state.orders)state.orders=[];
  state.orders.push(order);
  cart.forEach(c=>{if(!state.inventory[c.id])state.inventory[c.id]={stocked:0,wasted:0,sold:0};state.inventory[c.id].sold=(state.inventory[c.id].sold||0)+c.qty;});
  saveState();
  const recv=payMethod==='cash'&&order.receivedAmount?order.receivedAmount:0;
  const changeMsg=recv>0?` おつり ¥${(recv-total).toLocaleString()}`:'';
  showToast(`✅ 決済完了 ¥${total.toLocaleString()}（${PAY_LABELS[payMethod]}）${changeMsg}`);
  cart=[];receivedStr='';tenkeyOpen=false;
  document.getElementById('tenkey-wrap').style.display='none';
  updateReceivedDisp();renderMenuGrid();renderCart();calcChange();renderCashPresets();
}

function getInventory(itemId){const inv=state.inventory[itemId]||{};return{stocked:inv.stocked||0,wasted:inv.wasted||0,sold:inv.sold||0};}
function renderInventory(){
  document.getElementById('inv-grid').innerHTML=state.menuItems.map(item=>{
    const inv=getInventory(item.id);const remaining=inv.stocked-inv.sold-inv.wasted;
    const cls=remaining<=5&&inv.stocked>0?'low':(remaining>5?'ok':'');
    return `<div class="inv-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;"><span style="font-size:22px;">${item.emoji}</span><span style="font-size:13px;font-weight:700;">${item.name}</span></div>
      <div class="inv-row"><span class="inv-label">仕込み数</span><input class="inv-input" type="number" value="${inv.stocked}" min="0" onchange="updateInv(${item.id},'stocked',this.value)"></div>
      <div class="inv-row"><span class="inv-label">廃棄数</span><input class="inv-input" type="number" value="${inv.wasted}" min="0" style="border-color:#F0A0A0;" onchange="updateInv(${item.id},'wasted',this.value)"></div>
      <div class="inv-row"><span class="inv-label">販売済み</span><span style="font-size:13px;font-weight:700;color:var(--text2);">${inv.sold}個</span></div>
      <div class="inv-remaining ${cls}"><div class="inv-remaining-num">${Math.max(0,remaining)}</div><div class="inv-remaining-label">残数</div></div>
    </div>`;
  }).join('');
}
function updateInv(itemId,field,val){
  if(!state.inventory[itemId])state.inventory[itemId]={stocked:0,wasted:0,sold:0};
  state.inventory[itemId][field]=parseInt(val)||0;saveState();renderInventory();
}

let materialRows=[];
function initMaterialRows(){if(materialRows.length===0)materialRows=[{name:'',qty:1,price:0}];renderMaterialRows();}
function addMaterialRow(){materialRows.push({name:'',qty:1,price:0});renderMaterialRows();}
function removeMaterialRow(idx){if(materialRows.length<=1){materialRows=[{name:'',qty:1,price:0}];renderMaterialRows();return;}materialRows.splice(idx,1);renderMaterialRows();}
function updateMaterialRow(idx,field,val){materialRows[idx][field]=field==='name'?val:(parseFloat(val)||0);renderMaterialRows();}
function getMaterialSubtotal(r){return Math.round((r.qty||0)*(r.price||0));}
function getMaterialTotal(){return materialRows.reduce((s,r)=>s+getMaterialSubtotal(r),0);}
function renderMaterialRows(){
  document.getElementById('material-rows').innerHTML=materialRows.map((row,idx)=>`
    <div class="material-row">
      <input class="material-input" style="text-align:left;" type="text" placeholder="例：鶏もも肉" value="${row.name}" oninput="updateMaterialRow(${idx},'name',this.value)">
      <input class="material-input" type="number" placeholder="1" value="${row.qty||''}" min="0" step="0.1" oninput="updateMaterialRow(${idx},'qty',this.value)">
      <input class="material-input" type="number" placeholder="0" value="${row.price||''}" min="0" oninput="updateMaterialRow(${idx},'price',this.value)">
      <div class="material-subtotal">¥${getMaterialSubtotal(row).toLocaleString()}</div>
      <button class="material-del-btn" onclick="removeMaterialRow(${idx})">✕</button>
    </div>`).join('');
  document.getElementById('material-total').textContent='¥'+getMaterialTotal().toLocaleString();
}
function saveMaterialExpense(){
  const validRows=materialRows.filter(r=>r.name&&r.price>0);
  if(!validRows.length){showToast('⚠️ 品目名と単価を入力してください');return;}
  const total=getMaterialTotal();
  const memo=validRows.map(r=>`${r.name}×${r.qty}`).join('、');
  state.expenses.push({id:Date.now(),eventId:state.currentEventId,cat:'材料費',amount:total,memo,materials:validRows.map(r=>({...r,subtotal:getMaterialSubtotal(r)})),time:new Date().toISOString()});
  saveState();materialRows=[{name:'',qty:1,price:0}];renderMaterialRows();renderExpenses();showToast(`🥩 材料費 ¥${total.toLocaleString()} を登録しました`);
}
function addExpense(){
  const cat=document.getElementById('exp-cat').value;const amount=parseInt(document.getElementById('exp-amount').value)||0;const memo=document.getElementById('exp-memo').value;
  if(!amount){showToast('⚠️ 金額を入力してください');return;}
  state.expenses.push({id:Date.now(),eventId:state.currentEventId,cat,amount,memo,time:new Date().toISOString()});
  saveState();document.getElementById('exp-amount').value='';document.getElementById('exp-memo').value='';renderExpenses();showToast('💰 経費を追加しました');
}
function getEvtExpenses(){return(state.expenses||[]).filter(e=>e.eventId===state.currentEventId);}
function renderExpenses(){
  const list=getEvtExpenses();const total=list.reduce((s,e)=>s+e.amount,0);
  document.getElementById('expense-total').textContent='¥'+total.toLocaleString();
  const el=document.getElementById('expense-list');
  if(!list.length){el.innerHTML='<div class="empty-state"><div class="empty-emoji">💸</div>まだ経費がありません</div>';return;}
  el.innerHTML=[...list].reverse().map(e=>`
    <div class="expense-item">
      <span class="expense-cat-badge">${e.cat}</span>
      <span class="expense-memo">${e.memo||'—'}</span>
      <span class="expense-amount">¥${e.amount.toLocaleString()}</span>
      <button class="expense-del" onclick="deleteExpense(${e.id})">✕</button>
    </div>`).join('');
}
function deleteExpense(id){state.expenses=state.expenses.filter(e=>e.id!==id);saveState();renderExpenses();}

function renderReport(){
  const orders=(state.orders||[]).filter(o=>o.eventId===state.currentEventId);
  const expenses=getEvtExpenses();
  const totalSales=orders.reduce((s,o)=>s+o.total,0);const totalExpenses=expenses.reduce((s,e)=>s+e.amount,0);
  let totalCOGS=0,totalWasted=0;
  orders.forEach(o=>o.items.forEach(i=>{const m=state.menuItems.find(m=>m.id===i.id);if(m)totalCOGS+=m.cost*i.qty;}));
  state.menuItems.forEach(m=>{const inv=getInventory(m.id);totalWasted+=m.cost*inv.wasted;});
  const gp=totalSales-totalCOGS,np=gp-totalExpenses-totalWasted,mg=totalSales>0?Math.round(np/totalSales*100):0;
  document.getElementById('kpi-grid').innerHTML=`
    <div class="kpi-card"><div class="kpi-label">売上合計</div><div class="kpi-value orange">¥${totalSales.toLocaleString()}</div></div>
    <div class="kpi-card"><div class="kpi-label">販売件数</div><div class="kpi-value blue">${orders.length}件</div></div>
    <div class="kpi-card"><div class="kpi-label">粗利益</div><div class="kpi-value green">¥${gp.toLocaleString()}</div></div>
    <div class="kpi-card"><div class="kpi-label">経費合計</div><div class="kpi-value red">¥${totalExpenses.toLocaleString()}</div></div>
    <div class="kpi-card"><div class="kpi-label">廃棄ロス</div><div class="kpi-value red">¥${totalWasted.toLocaleString()}</div></div>
    <div class="kpi-card"><div class="kpi-label">純利益</div><div class="kpi-value ${np>=0?'green':'red'}">¥${np.toLocaleString()}</div></div>
    <div class="kpi-card"><div class="kpi-label">利益率</div><div class="kpi-value gold">${mg}%</div></div>
    <div class="kpi-card"><div class="kpi-label">原価合計</div><div class="kpi-value red">¥${totalCOGS.toLocaleString()}</div></div>`;
  const hd={};for(let h=9;h<=20;h++)hd[h]=0;
  orders.forEach(o=>{const h=new Date(o.time).getHours();hd[h]=(hd[h]||0)+o.total;});
  const mx=Math.max(1,...Object.values(hd));const hrs=Object.keys(hd).map(Number).sort((a,b)=>a-b);
  document.getElementById('hour-chart').innerHTML=hrs.map(h=>`<div class="hour-bar" style="height:${Math.round((hd[h]||0)/mx*55)+3}px;background:${hd[h]>0?'var(--primary)':'var(--border)'};" title="${h}時"></div>`).join('');
  document.getElementById('hour-labels').innerHTML=hrs.map(h=>`<div class="hour-label">${h}</div>`).join('');
  const pm={};orders.forEach(o=>o.items.forEach(i=>{if(!pm[i.id])pm[i.id]={qty:0,sales:0};pm[i.id].qty+=i.qty;pm[i.id].sales+=i.price*i.qty;}));
  document.getElementById('product-report-body').innerHTML=state.menuItems.filter(m=>pm[m.id]).map(m=>{
    const d=pm[m.id];const c=m.cost*d.qty;const p=d.sales-c;
    return `<tr><td>${m.emoji} ${m.name}</td><td class="num">${d.qty}個</td><td class="num" style="color:var(--primary)">¥${d.sales.toLocaleString()}</td><td class="num" style="color:var(--text3)">¥${c.toLocaleString()}</td><td class="num" style="color:${p>=0?'var(--success)':'var(--danger)'}">¥${p.toLocaleString()}</td></tr>`;
  }).join('')||'<tr><td colspan="5" style="text-align:center;padding:16px;color:var(--text3)">販売データがありません</td></tr>';
  const payM={};orders.forEach(o=>{if(!payM[o.payMethod])payM[o.payMethod]={count:0,total:0};payM[o.payMethod].count++;payM[o.payMethod].total+=o.total;});
  document.getElementById('pay-report-body').innerHTML=Object.keys(PAY_LABELS).filter(k=>payM[k]).map(k=>`<tr><td>${PAY_LABELS[k]}</td><td class="num">${payM[k].count}件</td><td class="num" style="color:var(--primary)">¥${payM[k].total.toLocaleString()}</td></tr>`).join('')||'<tr><td colspan="3" style="text-align:center;padding:16px;color:var(--text3)">データがありません</td></tr>';
}

function buildExportData(){
  const orders=(state.orders||[]).filter(o=>o.eventId===state.currentEventId);
  const expenses=getEvtExpenses();const evt=state.events.find(e=>e.id===state.currentEventId);
  const salesRows=[];
  orders.forEach(o=>o.items.forEach(i=>{const m=state.menuItems.find(m=>m.id===i.id);salesRows.push({'日時':new Date(o.time).toLocaleString('ja-JP'),'イベント':evt?evt.name:'','商品名':i.name,'数量':i.qty,'単価':i.price,'小計':i.price*i.qty,'原価単価':m?m.cost:0,'原価小計':m?m.cost*i.qty:0,'決済方法':PAY_LABELS[o.payMethod]||o.payMethod,'預かり金額':o.receivedAmount||'','注文ID':o.id});}));
  const expenseRows=expenses.map(e=>({'日時':new Date(e.time).toLocaleString('ja-JP'),'カテゴリ':e.cat,'メモ':e.memo,'金額':e.amount}));
  const invRows=state.menuItems.map(m=>{const inv=getInventory(m.id);return{'商品名':m.name,'仕込み数':inv.stocked,'販売数':inv.sold,'廃棄数':inv.wasted,'残数':Math.max(0,inv.stocked-inv.sold-inv.wasted),'廃棄ロス':m.cost*inv.wasted};});
  return{salesRows,expenseRows,invRows};
}
function exportCSV(){
  const{salesRows,expenseRows}=buildExportData();
  const toCSV=rows=>{if(!rows.length)return'';const h=Object.keys(rows[0]);return[h.join(','),...rows.map(r=>h.map(k=>`"${r[k]}"`).join(','))].join('\n');};
  const blob=new Blob(['\uFEFF=== 売上明細 ===\n'+toCSV(salesRows)+'\n\n=== 経費 ===\n'+toCSV(expenseRows)],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`karaage_${new Date().toISOString().slice(0,10)}.csv`;a.click();showToast('📄 CSVをダウンロードしました');
}
function exportXLSX(){
  if(typeof XLSX==='undefined'){showToast('⚠️ XLSX読み込み中...');return;}
  const{salesRows,expenseRows,invRows}=buildExportData();
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(salesRows.length?salesRows:[{'※':'データなし'}]),'売上明細');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(expenseRows.length?expenseRows:[{'※':'データなし'}]),'経費');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(invRows),'在庫・廃棄');
  XLSX.writeFile(wb,`karaage_${new Date().toISOString().slice(0,10)}.xlsx`);showToast('📊 Excelをダウンロードしました');
}

let dragSrcIdx=null;
function renderSettings(){
  document.getElementById('menu-settings-list').innerHTML=state.menuItems.map((item,idx)=>`
    <div class="menu-sort-item" draggable="true"
      ondragstart="onDragStart(event,${idx})" ondragover="onDragOver(event,${idx})"
      ondrop="onDrop(event,${idx})" ondragend="onDragEnd()">
      <span class="drag-handle">⠿⠿</span>
      <span style="font-size:20px;">${item.emoji}</span>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:700;">${item.name}${item.isSet?'<span style="font-size:9px;background:var(--gold-dark);color:#fff;border-radius:3px;padding:1px 4px;margin-left:4px;">SET</span>':''}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:1px;">${item.cat} / 原価¥${item.cost}</div>
      </div>
      <span style="font-size:14px;font-weight:900;color:var(--primary);min-width:60px;text-align:right;">¥${item.price.toLocaleString()}</span>
      <button class="icon-btn" onclick="openEditMenuModal(${item.id})">編集</button>
      <button class="icon-btn" style="border-color:#F0A0A0;color:var(--danger);" onclick="deleteMenuItem(${item.id})">削除</button>
    </div>`).join('');
  const evt=state.events.find(e=>e.id===state.currentEventId);
  if(evt){document.getElementById('evt-name').value=evt.name||'';document.getElementById('evt-date').value=evt.date||'';document.getElementById('evt-place').value=evt.place||'';}
}
function deleteMenuItem(id){
  state.menuItems=state.menuItems.filter(m=>String(m.id)!==String(id));
  saveState();renderSettings();showToast('🗑️ 削除しました');
}
function onDragStart(e,idx){dragSrcIdx=idx;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function onDragOver(e,idx){e.preventDefault();document.querySelectorAll('.menu-sort-item').forEach(el=>el.classList.remove('drag-over'));if(idx!==dragSrcIdx)e.currentTarget.classList.add('drag-over');}
function onDrop(e,idx){e.preventDefault();if(dragSrcIdx===null||dragSrcIdx===idx)return;const items=[...state.menuItems];const[m]=items.splice(dragSrcIdx,1);items.splice(idx,0,m);state.menuItems=items;saveState();renderSettings();showToast('↕️ 並び順を変更しました');}
function onDragEnd(){dragSrcIdx=null;document.querySelectorAll('.menu-sort-item').forEach(el=>{el.classList.remove('dragging');el.classList.remove('drag-over');});}

function openAddMenuModal(){
  document.getElementById('add-menu-title').textContent='🍗 メニューを追加';
  ['m-name','m-price','m-cost','m-edit-id'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-emoji').value='🍗';document.getElementById('m-cat').value='唐揚げ';document.getElementById('m-is-set').checked=false;
  document.getElementById('add-menu-modal').classList.add('open');
}
function openEditMenuModal(id){
  const item=state.menuItems.find(m=>String(m.id)===String(id));if(!item)return;
  document.getElementById('add-menu-title').textContent='✏️ メニューを編集';
  document.getElementById('m-emoji').value=item.emoji;document.getElementById('m-name').value=item.name;
  document.getElementById('m-cat').value=item.cat;document.getElementById('m-price').value=item.price;
  document.getElementById('m-cost').value=item.cost;document.getElementById('m-is-set').checked=item.isSet;
  document.getElementById('m-edit-id').value=id;
  document.getElementById('add-menu-modal').classList.add('open');
}
function saveMenuItem(){
  const name=document.getElementById('m-name').value.trim();const price=parseInt(document.getElementById('m-price').value)||0;
  if(!name||!price){showToast('⚠️ 商品名と価格は必須です');return;}
  const editId=document.getElementById('m-edit-id').value;
  const item={emoji:document.getElementById('m-emoji').value||'🍗',name,cat:document.getElementById('m-cat').value,price,cost:parseInt(document.getElementById('m-cost').value)||0,isSet:document.getElementById('m-is-set').checked};
  if(editId){const idx=state.menuItems.findIndex(m=>String(m.id)===String(editId));if(idx>=0)state.menuItems[idx]={...state.menuItems[idx],...item};}
  else{item.id=Date.now();state.menuItems.push(item);}
  saveState();closeModal('add-menu-modal');renderSettings();showToast('✅ メニューを保存しました');
}
function openEventModal(){
  const el=document.getElementById('event-list-modal');
  el.innerHTML=(!state.events||!state.events.length)?'<div class="empty-state">イベントがありません</div>':state.events.map(e=>`
    <div class="menu-sort-item" style="cursor:pointer;" onclick="selectEvent(${e.id})">
      <span style="font-size:20px;">📅</span>
      <div style="flex:1;"><div style="font-size:13px;font-weight:700;">${e.name}</div><div style="font-size:11px;color:var(--text3);">${e.date||'日付未設定'}${e.place?' / '+e.place:''}</div></div>
      ${e.id===state.currentEventId?'<span style="color:var(--primary);font-size:18px;">✓</span>':''}
    </div>`).join('');
  document.getElementById('event-modal').classList.add('open');
}
function selectEvent(id){state.currentEventId=id;saveState();updateEventName();closeModal('event-modal');showToast('📅 イベントを切り替えました');}
function saveEvent(){
  const name=document.getElementById('evt-name').value.trim();if(!name){showToast('⚠️ イベント名を入力してください');return;}
  const idx=state.events.findIndex(e=>e.id===state.currentEventId);
  const evtData={name,date:document.getElementById('evt-date').value,place:document.getElementById('evt-place').value};
  if(idx>=0){state.events[idx]={...state.events[idx],...evtData};}
  else{const newEvt={id:Date.now(),...evtData};state.events.push(newEvt);state.currentEventId=newEvt.id;}
  saveState();updateEventName();showToast('✅ イベントを保存しました');
}
function updateEventName(){const evt=state.events&&state.events.find(e=>e.id===state.currentEventId);document.getElementById('current-event-name').textContent=evt?`📅 ${evt.name}`:'イベント未選択';}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');}));
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);}

loadState();seedDefaultData();updateEventName();renderRegister();
</script>
</body>
